<h2>Login</h2>

<form (ngSubmit)="login()">

  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="model.email"
    name="email"
    required
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="model.password"
    name="password"
    required
  />

  <button type="submit">
    Login
  </button>

</form>
