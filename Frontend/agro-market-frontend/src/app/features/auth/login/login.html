<div class="row justify-content-center">

  <div class="col-md-4">

    <div class="card p-4 shadow">

      <h3 class="text-center mb-3">Login</h3>

      <form (ngSubmit)="login()">

        <input class="form-control mb-3" placeholder="Email" [(ngModel)]="model.email" name="email" />

        <input type="password" class="form-control mb-3" placeholder="Parolă" [(ngModel)]="model.password"
          name="password" />

        <button class="btn btn-primary w-100">
          Login
        </button>

      </form>

    </div>

  </div>

</div>
