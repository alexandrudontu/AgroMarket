<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card p-4 shadow">

            <h3 class="text-center mb-3">Înregistrare</h3>

            <form (ngSubmit)="register()">

                <input class="form-control mb-2" placeholder="Prenume" [(ngModel)]="model.firstName"
                    name="firstName" />

                <input class="form-control mb-2" placeholder="Nume" [(ngModel)]="model.lastName" name="lastName" />

                <input class="form-control mb-2" placeholder="Email" [(ngModel)]="model.email" name="email" />

                <input type="password" class="form-control mb-2" placeholder="Parolă" [(ngModel)]="model.password"
                    name="password" />

                <select class="form-select mb-3" [(ngModel)]="model.accountType" name="accountType">
                    <option value="Customer">Client</option>
                    <option value="Farmer">Fermier</option>
                </select>

                <button class="btn btn-success w-100">
                    Înregistrează-te
                </button>

            </form>

        </div>

    </div>

</div>
