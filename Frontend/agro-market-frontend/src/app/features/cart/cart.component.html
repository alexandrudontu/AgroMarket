<h2 class="mb-4">Shopping Cart</h2>

<div *ngIf="cart?.items?.length; else empty">

    <div class="card mb-3" *ngFor="let item of cart.items">

        <div class="card-body d-flex justify-content-between align-items-center">

            <div>
                <h5>{{ item.productName }}</h5>
                <p class="mb-0 text-muted">
                    {{ item.quantity }} x {{ item.unitPrice }} RON
                </p>
            </div>

            <div class="text-end">
                <p class="fw-bold">{{ item.lineTotal }} RON</p>

                <button class="btn btn-danger btn-sm" (click)="remove(item.productId)">
                    Remove
                </button>
            </div>

        </div>

    </div>

    <div class="text-end mt-4">
        <h4>Total: {{ cart.totalAmount }} RON</h4>

        <button class="btn btn-success me-2" (click)="checkout()">
            Checkout
        </button>

        <button class="btn btn-outline-danger" (click)="clear()">
            Clear
        </button>
    </div>

</div>

<ng-template #empty>
    <div class="alert alert-info">
        Cart is empty 🛒
    </div>
</ng-template>
