<h2>Shopping Cart</h2>
<div>
    @if (cart?.items?.length > 0) {

    @for (item of cart.items; track item.productId) {

    <h3>{{ item.productName }}</h3>

    <p>Price: {{ item.unitPrice }} RON</p>
    <p>Quantity: {{ item.quantity }}</p>
    <p>Total: {{ item.lineTotal }} RON</p>

    <button (click)="remove(item.productId)">
        Remove
    </button> 
    <hr>
    }

<h3>Total: {{ cart.totalAmount }} RON</h3>

<button (click)="checkout()">
    Checkout
</button>

<button (click)="clear()">
    Clear Cart
</button>

} @else {
<p>Cart is empty 🛒</p>
}
</div>
