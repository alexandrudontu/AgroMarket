<div class="row">

  <!-- FORM -->
  <div class="col-md-4">

    <div class="product-form-card">

      <!-- HEADER -->
      <div class="form-header">

        <h2>
          {{ editingProductId
          ? 'Editează Produs'
          : 'Adaugă Produs' }}
        </h2>

      </div>

      <!-- NAME -->
      <div class="form-group">

        <label>
          Nume
        </label>

        <input type="text" class="modern-input" [(ngModel)]="model.name" placeholder="Introduceți numele produsului">

      </div>

      <!-- DESCRIPTION -->
      <div class="form-group">

        <label>
          Descriere
        </label>

        <textarea class="modern-input modern-textarea" [(ngModel)]="model.description" placeholder="Descrieți produsul">
      </textarea>

      </div>

      <!-- PRICE + STOCK -->
      <div class="row">

        <div class="col-md-6">

          <div class="form-group">

            <label>
              Preț (RON)
            </label>

            <input type="number" min="0" class="modern-input" [(ngModel)]="model.price" placeholder="0">

          </div>

        </div>

        <div class="col-md-6">

          <div class="form-group">

            <label>
              Stoc disponibil
            </label>

            <input type="number" min="0" class="modern-input" [(ngModel)]="model.quantity" placeholder="0">

          </div>

        </div>

      </div>

      <!-- UNIT -->
      <div class="form-group">

        <label>
          Unitate de măsură
        </label>

        <select class="modern-input" [(ngModel)]="model.unitOfMeasurement">

          <option [ngValue]="null">
            Selectați unitatea
          </option>

          <option>Kg</option>
          <option>L</option>
          <option>Buc.</option>

        </select>

      </div>

      <!-- CATEGORY -->
      <div class="form-group">

        <label>
          Categorie
        </label>

        <select class="modern-input" [(ngModel)]="model.categoryId">

          <option [ngValue]="null">
            Selectați categoria
          </option>

          <option *ngFor="let c of categories" [ngValue]="c.id">

            {{ c.name }}

          </option>

        </select>

      </div>

      <!-- IMAGE UPLOAD -->
      <div class="upload-area">

        <div class="upload-icon">
          📸
        </div>

        <h5>
          Adăugați imagini pentru produs
        </h5>

        <input type="file" multiple class="form-control" (change)="onFileSelected($event)">

      </div>

      <!-- PREVIEWS -->
      <div class="preview-grid" *ngIf="imagePreviews.length">

        <div class="preview-item" *ngFor="let img of imagePreviews">

          <img [src]="img">

        </div>

      </div>

      <!-- BUTTON -->
      <button class="save-btn" (click)="save()">

        Salvează

      </button>

    </div>

  </div>

  <!-- PRODUCTS -->
  <div class="col-md-8">

    <div class="products-grid">

      <div class="product-card" *ngFor="let p of products" [class.expanded]="expandedProductId === p.id">

        <!-- MAIN CARD -->
        <div class="compact-view" (click)="toggleExpand(p.id)">

          <!-- IMAGE -->
          <div class="carousel-container" *ngIf="p.productImages?.length">

            <!-- IMAGE -->
            <img [src]="apiUrl + getCurrentImage(p)?.imageUrl" class="product-main-image" />

            <!-- PREV -->
            <button class="carousel-btn left" (click)="prevImage(p); $event.stopPropagation()">

              ‹

            </button>

            <!-- NEXT -->
            <button class="carousel-btn right" (click)="nextImage(p); $event.stopPropagation()">

              ›

            </button>

          </div>

          <!-- INFO -->
          <div class="p-3">

            <h5 class="product-title">
              {{ p.name }}
            </h5>

            <div class="price">
              {{ p.price }} RON / {{ p.unitOfMeasurement }}
            </div>

          </div>

        </div>

        <!-- EXPANDED -->
        <div class="expanded-view" [@expandAnimation]="
       expandedProductId === p.id
       ? 'expanded'
       : 'collapsed'
     " *ngIf="expandedProductId === p.id">

          <hr>

          <!-- DETAILS -->
          <div class="mb-3">

            <p>
              <b>Categorie:</b>
              {{ p.categoryName }}
            </p>

            <div class="mb-3">

              <span class="stock-badge" [ngClass]="{
          'stock-high': p.quantity > 20,
          'stock-medium': p.quantity > 0 && p.quantity <= 20,
          'stock-low': p.quantity === 0
        }">

                {{ p.quantity === 0
                ? 'Stoc epuizat'
                : p.quantity + ' în stoc' }}

              </span>

            </div>

            <p>
              <b>Descriere:</b>
              {{ p.description }}
            </p>

          </div>

          <!-- GALLERY -->
          <div class="gallery mb-3">

            <div class="gallery-item" *ngFor="let img of p.productImages">

              <!-- IMAGE -->
              <img [src]="apiUrl + img.imageUrl">

              <!-- OVERLAY -->
              <div class="image-overlay">

                <button class="delete-btn" (click)="deleteImage(img.id)">

                  ✕

                </button>

              </div>

            </div>

          </div>

          <!-- ACTIONS -->
          <div class="d-flex gap-2 product-actions">

            <button class="btn btn-primary" (click)="edit(p)">
              Editează
            </button>

            <button class="btn btn-danger" (click)="delete(p.id)">
              Șterge
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
