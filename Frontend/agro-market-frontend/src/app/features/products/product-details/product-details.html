<div *ngIf="product">
  <div class="row">

    <!-- GALLERY -->
    <div class="col-md-6">

      <img *ngIf="selectedImage" [src]="'https://localhost:7183' + selectedImage" class="img-fluid rounded shadow mb-3"
        style="height:400px; object-fit:cover; width:100%;" />

      <!-- THUMBNAILS -->
      <div class="d-flex gap-2 flex-wrap">

        <img *ngFor="let img of product.images" [src]="'https://localhost:7183' + img.imageUrl" (click)="selectedImage = img"
          style="width:80px;
                  height:80px;
                  object-fit:cover;
                  cursor:pointer;" class="rounded border" />

      </div>

    </div>

    <!-- DETAILS -->
    <div class="col-md-6">

      <h2>{{ product.name }}</h2>

      <p>{{ product.description }}</p>

      <p>{{ product.quantity }} {{ product.unitOfMeasurement }} in stock</p>

      <h4>{{ product.price }} RON / {{ product.unitOfMeasurement }}</h4>

      <button *ngIf="authService.getUserRole() === 'Customer'" class="btn btn-primary" (click)="addToCart()">
        Add to cart
      </button>

    </div>

  </div>
</div>
