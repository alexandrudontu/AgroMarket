<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

<div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <!-- LOGO -->
        <div class="sidebar-logo" routerLink="/">

            Tellus Market

        </div>

        <!-- LINKS -->
        <div class="sidebar-links">

            <!-- HOME -->
            <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">

                <span>🔎</span>
                Explorează

            </a>

            <!-- CUSTOMER -->
            <ng-container *ngIf="authService.getUserRole() === 'Customer'">

                <a routerLink="/categories" routerLinkActive="active-link">

                    <span>📚</span>
                    Categorii

                </a>

                <a routerLink="/farmers-nearby" routerLinkActive="active">
                    👨‍🌾 Fermieri locali
                </a>

                <a routerLink="/cart" routerLinkActive="active-link">

                    <span>🛒</span>
                    Coș

                </a>

                <a routerLink="/orders" routerLinkActive="active-link">

                    <span>📦</span>
                    Comenzi

                </a>

            </ng-container>

            <!-- FARMER -->
            <ng-container *ngIf="authService.getUserRole() === 'Farmer'">

                <a routerLink="/farmer" routerLinkActive="active-link">

                    <span>🌾</span>
                    Produsele mele

                </a>

                <a routerLink="/farmer/location" routerLinkActive="active-link">

                    <span>📍</span>
                    Locația mea

                </a>

            </ng-container>

            <!-- ADMIN -->
            <ng-container *ngIf="authService.getUserRole() === 'Admin'">

                <a routerLink="/admin/categories" routerLinkActive="active-link">

                    <span>📂</span>
                    Categorii

                </a>

                <a routerLink="/admin/farmers" routerLinkActive="active-link">

                    <span>👨‍🌾</span>
                    Fermieri

                </a>

            </ng-container>

        </div>

        <!-- BOTTOM -->
        <div class="sidebar-bottom">

            <!-- NOT LOGGED -->
            <ng-container *ngIf="!authService.isLoggedIn()">

                <a routerLink="/login" class="sidebar-btn login-btn">

                    Login

                </a>

                <a routerLink="/register" class="sidebar-btn register-btn">

                    Înregistrare

                </a>

            </ng-container>

            <!-- LOGGED -->
            <button *ngIf="authService.isLoggedIn()" class="sidebar-btn logout-btn" (click)="logout()">

                Logout

            </button>

        </div>

    </aside>

    <!-- CONTENT -->
    <main class="main-content">

        <router-outlet></router-outlet>

    </main>

</div>
